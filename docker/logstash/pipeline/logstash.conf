input {
  file {
    # 读取挂载进来的 Java 应用日志
    path => "/usr/share/logstash/app-logs/travel-hub.log"
    start_position => "beginning"
    # 用 plain codec，因为 logback 输出的是单行 JSON 文本
    codec => plain
    # sincedb 路径，记录读取位置，重启不重复读
    sincedb_path => "/usr/share/logstash/data/sincedb_app"
  }
}

filter {
  # 解析 JSON 日志（logback 输出的每行都是一个 JSON 对象）
  json {
    source => "message"
    target => "parsed"
    skip_on_invalid_json => true
  }

  # 将解析出的字段提升到顶层，方便 Kibana 搜索
  if "_jsonparsefailure" not in [tags] {
    mutate {
      rename => {
        "[parsed][timestamp]"        => "app_timestamp"
        "[parsed][level]"            => "app_level"
        "[parsed][traceId]"          => "traceId"
        "[parsed][agentName]"        => "agentName"
        "[parsed][subAgentName]"     => "subAgentName"
        "[parsed][round]"            => "round"
        "[parsed][isRetry]"          => "isRetry"
        "[parsed][eventType]"        => "eventType"
        "[parsed][plannerAction]"    => "plannerAction"
        "[parsed][plannerInput]"     => "plannerInput"
        "[parsed][plannerOutput]"    => "plannerOutput"
        "[parsed][workerConclusion]" => "workerConclusion"
        "[parsed][toolNames]"        => "toolNames"
        "[parsed][logger]"           => "app_logger"
        "[parsed][thread]"           => "app_thread"
        "[parsed][msg]"              => "app_msg"
      }
    }
  }

  # 添加应用标识
  mutate {
    add_field => { "application" => "travel-hub" }
  }

  # 转换时间格式
  date {
    match => [ "app_timestamp", "yyyy-MM-dd HH:mm:ss.SSS" ]
    target => "@timestamp"
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "travel-hub-%{+YYYY.MM.dd}"
  }

  # 调试时可以打开，看输出结果
  # stdout { codec => rubydebug }
}
