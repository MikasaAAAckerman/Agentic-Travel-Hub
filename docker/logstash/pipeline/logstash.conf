input {
  file {
    path => "/usr/share/logstash/logs/travel-hub.json"
    start_position => "beginning"
    codec => json
  }
}

filter {
  # 解析 JSON 日志字段
  mutate {
    add_field => { "application" => "travel-hub" }
  }

  # 转换时间格式
  date {
    match => [ "timestamp", "yyyy-MM-dd HH:mm:ss.SSS" ]
    target => "@timestamp"
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "travel-hub-%{+YYYY.MM.dd}"
  }
}
