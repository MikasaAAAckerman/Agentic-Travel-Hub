# Grafana 数据源配置
# 自动配置 Prometheus、Jaeger、Elasticsearch

apiVersion: 1

datasources:
  # Prometheus 数据源（指标）
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true

  # Jaeger 数据源（链路追踪）
  - name: Jaeger
    type: jaeger
    access: proxy
    url: http://jaeger:16686
    editable: true

  # Elasticsearch 数据源（日志）
  - name: Elasticsearch
    type: elasticsearch
    access: proxy
    url: http://elasticsearch:9200
    database: "travel-hub-*"
    editable: true
    jsonData:
      timeField: "@timestamp"
      esVersion: "8.11.0"
      logMessageField: "app_msg"
      logLevelField: "app_level"
