#####################

# 当前服务配置
server:
  port: 8080

spring:
  profiles:
    active: dev
  application:
    name: agentic-travel-hub

  # PostgreSQL 数据源（PGVector 向量数据库）
  datasource:
    url: jdbc:postgresql://localhost:5432/travel_hub
    username: travel
    password: travel123

  ai:
    # 指定 Embedding 模型使用 DashScope
    model:
      embedding: dashscope

    # ── DashScope（通义千问 + Embedding）──
    dashscope:
      api-key: xxxxx
      chat:
        options:
          model: qwen-plus
      embedding:
        options:
          model: text-embedding-v3

    # ── DeepSeek（通过 OpenAI 兼容接口）──
    openai:
      api-key: xxxxx
      base-url: https://api.deepseek.com
      chat:
        options:
          model: deepseek-v4-pro
      embedding:
        enabled: false

    # ── PGVector 向量存储 ──
    vectorstore:
      pgvector:
        table-name: travel_hub_vectors
        dimensions: 1536
        distance-type: COSINE_DISTANCE

    # ── MCP 工具服务 ──
    mcp:
      client:
        enabled: true
        stdio:
          connections:
            amap-maps-server:
              command: npx.cmd
              args:
                - "-y"
                - "@amap/amap-maps-mcp-server"
              env:
                AMAP_MAPS_API_KEY: "your-amap-api-key"

# ==================== 日志配置 ====================
logging:
  level:
    org.springframework.ai: DEBUG
    com.travel.aiagent: DEBUG
  file:
    name: ${user.dir}/logs/travel-hub.log

# ==================== Actuator + Prometheus 指标 ====================
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: http://localhost:14318/v1/traces

# ==================== 自定义配置 ====================

# 旅行资料库名称（DashScope 知识库）
travel-document-retriever-name: "旅行衣食住行资料库"

# SubAgent 循环次数限制
max-loop-times:
  orchestrator-to-subagent: 16
  planner-to-worker: 7

# Tavily 搜索 API Key
tavily-api-secret: your-tavily-api-key
